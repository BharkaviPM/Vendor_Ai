<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-20 bg-white p-6 rounded shadow">

    <h2 class="text-xl font-bold mb-4">Ask AI about Vendors</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="question" placeholder="Ask something..."
               class="w-full border p-2 mb-4">

        <button class="bg-green-500 text-white px-4 py-2 rounded">
            Ask
        </button>
    </form>

    {% if answer %}
        <div class="mt-4 p-3 bg-gray-200 rounded">
            {{ answer }}
        </div>
    {% endif %}

</div>

</body>
</html>
